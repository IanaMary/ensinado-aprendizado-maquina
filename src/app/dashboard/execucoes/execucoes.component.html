<div class="execucoes-container">
  <!-- Header -->
  <div class="execucoes-header">
    <div class="header-info">
      <h2>Área de Trabalho</h2>
      <p>Arraste os itens do pipeline ou clique para executar</p>
    </div>
    <button class="btn-clear" (click)="limparSessao()">
      <mat-icon>delete_outline</mat-icon>
      Limpar
    </button>
  </div>

  <!-- Columns -->
  <div class="execucoes-columns">
    <!-- Coleta -->
    <div class="column">
      <div class="column-header">
        <div class="column-icon coleta">
          <mat-icon>upload_file</mat-icon>
        </div>
        <span>Coleta</span>
      </div>
      <div class="column-content" cdkDropList [cdkDropListData]="colunaColeta"
        [cdkDropListConnectedTo]="['treinoList', 'metricaList']" id="coletaList">
        <div *ngFor="let item of colunaColeta" cdkDrag class="item-card" (click)="abrirModalExecucao(item)">
          <div class="item-icon">
            <img [src]="'assets/icons/' + item.tipoItem + '.svg'" width="16" />
          </div>
          <span>{{ item.label }}</span>
          <mat-icon class="item-arrow">chevron_right</mat-icon>
        </div>
      </div>
    </div>

    <!-- Treino -->
    <div class="column">
      <div class="column-header">
        <div class="column-icon treino">
          <mat-icon>model_training</mat-icon>
        </div>
        <span>Treinamento</span>
      </div>
      <div class="column-content" cdkDropList #treinoList="cdkDropList" [cdkDropListData]="colunaTreino"
        [cdkDropListConnectedTo]="['coletaList', 'metricaList']">
        <div *ngFor="let item of colunaTreino" cdkDrag class="item-card" (click)="abrirModalExecucao(item)">
          <div class="item-icon">
            <img [src]="'assets/icons/' + item.tipoItem + '.svg'" width="16" />
          </div>
          <span>{{ item.label }}</span>
          <mat-icon class="item-arrow">chevron_right</mat-icon>
        </div>
      </div>
    </div>

    <!-- Métricas -->
    <div class="column">
      <div class="column-header">
        <div class="column-icon metrica">
          <mat-icon>analytics</mat-icon>
        </div>
        <span>Métricas</span>
      </div>
      <div class="column-content" cdkDropList #metricaList="cdkDropList" [cdkDropListData]="colunaMetrica"
        [cdkDropListConnectedTo]="['coletaList', 'treinoList']">
        <div *ngFor="let item of colunaMetrica" cdkDrag class="item-card" (click)="abrirModalExecucao(item)">
          <div class="item-icon">
            <img [src]="'assets/icons/' + item.tipoItem + '.svg'" width="16" />
          </div>
          <span>{{ item.label }}</span>
          <mat-icon class="item-arrow">chevron_right</mat-icon>
        </div>
      </div>
    </div>

    <!-- Tutor -->
    <div class="column tutor-column">
      <div class="column-header">
        <div class="column-icon tutor">
          <mat-icon>school</mat-icon>
        </div>
        <span>Tutor</span>
      </div>
      <div class="column-content tutor-content">
        <app-tutor [tutorGeral]="tutor"></app-tutor>
      </div>
    </div>
  </div>
</div>
