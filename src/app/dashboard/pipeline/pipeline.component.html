<div class="pipeline-container">
  <!-- Coleta -->
  <div class="pipeline-section">
    <div class="section-label">
      <div class="step-number">1</div>
      <span>Coleta de Dados</span>
    </div>
    <app-coleta-de-dados></app-coleta-de-dados>
  </div>

  <!-- Treino -->
  <div class="pipeline-section">
    <div class="section-label">
      <div class="step-number">2</div>
      <span>Modelos</span>
    </div>
    <app-treino-validacao-teste></app-treino-validacao-teste>
  </div>

  <!-- Métricas -->
  <div class="pipeline-section">
    <div class="section-label">
      <div class="step-number">3</div>
      <span>Métricas</span>
    </div>
    <app-metricas></app-metricas>
  </div>

  <!-- Ações -->
  <div class="pipeline-actions">
    <button (click)="navegar(true)" class="btn-secondary" *ngIf="role !== 'aluno'">
      <mat-icon>arrow_back</mat-icon>
      Voltar
    </button>
    <button (click)="navegar(false)" class="btn-danger">
      <mat-icon>logout</mat-icon>
      Sair
    </button>
  </div>
</div>
