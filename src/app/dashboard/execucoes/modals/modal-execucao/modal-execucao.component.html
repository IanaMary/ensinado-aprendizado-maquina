<div class="modal-layout" [class.expanded]="drawerOpen">
  <!-- Coluna principal -->
  <div class="main-content" [class.main-content-pad]="drawerOpen">

    <nav class="modal-cabecalho">
      <div class="cabecalho-topo">
        <h2>{{ etapas[etapaAtual].titulo }}</h2>
        <button mat-icon-button class="close-button" (click)="fechar()">
          <mat-icon>close</mat-icon>
        </button>
      </div>

      <div class="breadcrumb-trail">
        <ng-container *ngFor="let key of etapaKeys; let idx = index; let last = last">
          <div class="step" [ngClass]="getClasseLinhaPipe(idx)"
            [class.clickable]="idx < etapas[etapaAtual].indice"
            (click)="irParaEtapa(idx)">
            <div class="step-circle">
              <mat-icon *ngIf="idx < etapas[etapaAtual].indice">check</mat-icon>
              <span *ngIf="idx >= etapas[etapaAtual].indice">{{ idx + 1 }}</span>
            </div>
            <span class="step-label">{{ etapas[key].titulo }}</span>
          </div>
          <div *ngIf="!last" class="step-line" [class.completed]="idx < etapas[etapaAtual].indice"></div>
        </ng-container>
      </div>

      <mat-divider></mat-divider>
    </nav>

    <section class="modal-conteudo">
      <ng-container [ngSwitch]="etapas[etapaAtual].indice">

        <ng-container *ngSwitchCase="0">
          <app-coleta-dado [resultadoColetaDado]="resultadoColetaDado"
            [tipoArquivoSelecionado]="tipoArquivoSelecionado"
            (resultadoColetaDadoModificado)="atualizarResultadoColeta($event)">
          </app-coleta-dado>
        </ng-container>

        <ng-container *ngSwitchCase="1">
          <app-pre-processamento-config
            [resultadoColetaDado]="resultadoColetaDado"
            [preProcessamentoConfig]="preProcessamentoConfig"
            (preProcessamentoModificado)="atualizarPreProcessamento($event)">
          </app-pre-processamento-config>
        </ng-container>

        <ng-container *ngSwitchCase="2">
          <app-tipos-classificadores [modelosDisponiveis]="modelosDisponiveis" [modeloSelecionado]="modeloSelecionado"
            (selecaoModelo)="atualizarModelo($event)">
          </app-tipos-classificadores>
        </ng-container>

        <ng-container *ngSwitchCase="3">
          <app-classificador [resultadoTreinamento]="resultadoTreinamento" [resultadoColetaDado]="resultadoColetaDado"
            [modeloSelecionado]="modeloSelecionado"
            (atualizarResultadoTreinamento)="atualizarResultadoTreinamento($event)">
          </app-classificador>
        </ng-container>

        <ng-container *ngSwitchCase="4">
          <app-selecao-metricas [metricasDisponiveis]="metricasDisponiveis"
            (selecaoMetricas)="atualizarMetricasSelecionadas($event)">
          </app-selecao-metricas>
        </ng-container>

        <ng-container *ngSwitchCase="5">
          <app-metrica-avaliacao [resultadosDasAvaliacoes]="resultadosDasAvaliacoes"
            [metricasSelecionadas]="metricasSelecionadas" [resultadoTreinamento]="resultadoTreinamento"
            [resultadoColetaDado]="resultadoColetaDado" [modeloSelecionado]="modeloSelecionado"
            [hiperparametros]="hiperparametrosAtuais" [preProcessamentoConfig]="preProcessamentoConfig"
            (atualizarResultadoAvaliacoes)="funcResultadoAvaliacoes($event)">
          </app-metrica-avaliacao>
        </ng-container>

      </ng-container>
    </section>

    <div class="modal-footer">
      <button *ngIf="etapas[etapaAtual].indice" mat-raised-button (click)="anterior()"
        [disabled]="etapas[etapaAtual].indice === 0">Anterior</button>
      <button *ngIf="etapas[etapaAtual].indice < nEtapas - 1" mat-raised-button color="primary" (click)="proximo()"
        [disabled]="etapas[etapaAtual].proximo">
        {{ etapas[etapaAtual].botaoProximo ? etapas[etapaAtual].botaoProximo : 'Próximo'}}
      </button>
      <button *ngIf="etapas[etapaAtual].indice === nEtapas - 1" mat-raised-button color="primary" (click)="fechar()">
        Fechar
      </button>
    </div>
  </div>

  <!-- Gaveta lateral -->
  <div class="side-drawer" *ngIf="drawerOpen">
    <!-- Info da etapa atual -->
    <div *ngIf="tutorPipelineInfo" class="pipeline-info">
      <h4>{{ tutorPipelineInfo.titulo }}</h4>
      <p>{{ tutorPipelineInfo.descricao }}</p>
      <ul *ngIf="tutorPipelineInfo.dicas?.length">
        <li *ngFor="let dica of tutorPipelineInfo.dicas">{{ dica }}</li>
      </ul>
    </div>

    <!-- Tutor com contexto -->
    <app-tutor
      [explicacao]="explicacaoAtual"
      [contexto]="tutorContexto"
      [modeloSelecionado]="modeloSelecionado"
      [metricaSelecionada]="metricasSelecionadas[0]">
    </app-tutor>
  </div>
</div>
