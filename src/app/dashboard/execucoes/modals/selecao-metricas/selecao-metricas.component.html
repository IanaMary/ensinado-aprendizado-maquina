<nav class="selecao-metricas">
  <div class="header-metricas">
    <button mat-icon-button class="btn-toggle"
      [matTooltip]="todasMarcadas ? 'Desmarcar todas' : 'Selecionar todas'"
      (click)="toggleTodas()">
      <mat-icon>{{ todasMarcadas ? 'deselect' : 'select_all' }}</mat-icon>
    </button>
    <span class="label">Métricas disponíveis</span>
  </div>

  <ng-container *ngIf="grupos.length">
    <div *ngFor="let grupo of grupos" class="grupo-metricas">
      <div class="grupo-header">
        <mat-icon>{{ grupo.icone }}</mat-icon>
        <span>{{ grupo.nome }}</span>
        <button mat-icon-button class="btn-grupo-toggle"
          [matTooltip]="'Selecionar todas do grupo'"
          (click)="toggleGrupo(grupo)">
          <mat-icon>select_all</mat-icon>
        </button>
      </div>

      <div *ngFor="let metrica of grupo.itens" class="metrica-item">
        <mat-checkbox (change)="toggleMetrica(metrica)" [(ngModel)]="metrica.movido">
          <div class="metrica-conteudo">
            <span class="metrica-label">{{ metrica?.label }}</span>
            <span class="metrica-explicacao" *ngIf="metrica.explicacao">{{ metrica.explicacao }}</span>
            <span class="metrica-explicacao" *ngIf="!metrica.explicacao && metrica.resumo">{{ metrica.resumo }}</span>
          </div>
        </mat-checkbox>
      </div>
    </div>
  </ng-container>

  <section class="media-config" *ngIf="temClassificacao">
    <div class="media-header">
      <span class="label">Agregação para métricas multiclasse</span>
    </div>

    <mat-radio-group class="media-options" [ngModel]="mediaMetricas" (ngModelChange)="atualizarMedia($event)">
      <mat-radio-button *ngFor="let media of medias" [value]="media.valor">
        {{ media.label }}
      </mat-radio-button>
    </mat-radio-group>

    <div class="media-descricao" *ngFor="let media of medias" [class.ativa]="media.valor === mediaMetricas">
      <strong>{{ media.label }}</strong>
      <span>{{ media.descricao }}</span>
    </div>
  </section>
</nav>
