<div class="shell" [class.sidebar-collapsed]="sidebarCollapsed">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo" (click)="navigate('/view-aluno')">
        <span class="logo-icon">IA</span>
        <span class="logo-text" *ngIf="!sidebarCollapsed">Iana</span>
      </div>
      <button class="toggle-btn" (click)="toggleSidebar()">
        <mat-icon>{{ sidebarCollapsed ? 'chevron_right' : 'chevron_left' }}</mat-icon>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a
        *ngFor="let item of filteredNavItems"
        class="nav-item"
        [class.active]="isActive(item.route)"
        (click)="navigate(item.route)"
        [matTooltip]="item.label"
        matTooltipPosition="right"
      >
        <mat-icon>{{ item.icon }}</mat-icon>
        <span class="nav-label" *ngIf="!sidebarCollapsed">{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info" *ngIf="!sidebarCollapsed">
        <div class="user-avatar">{{ userInitials }}</div>
        <div class="user-details">
          <span class="user-name">{{ userName }}</span>
          <span class="user-role">{{ roleLabel }}</span>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()" matTooltip="Sair" matTooltipPosition="right">
        <mat-icon>logout</mat-icon>
        <span *ngIf="!sidebarCollapsed">Sair</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" (click)="toggleSidebar()">
          <mat-icon>menu</mat-icon>
        </button>
        <app-breadcrumb></app-breadcrumb>
      </div>
      <div class="topbar-right">
        <!-- User Menu -->
        <div class="user-menu-container">
          <button class="user-menu-btn" (click)="toggleUserMenu($event)">
            <div class="user-avatar-small">{{ userInitials }}</div>
            <div class="user-info-topbar">
              <span class="user-name">{{ userName }}</span>
              <span class="user-role">{{ roleLabel }}</span>
            </div>
            <mat-icon class="menu-arrow" [class.open]="userMenuOpen">expand_more</mat-icon>
          </button>

          <!-- Dropdown Menu -->
          <div class="user-dropdown" *ngIf="userMenuOpen">
            <div class="dropdown-header">
              <div class="user-avatar-large">{{ userInitials }}</div>
              <div class="user-details-dropdown">
                <span class="user-name">{{ userName }}</span>
                <span class="user-email">{{ userEmail }}</span>
                <span class="user-role-badge">{{ roleLabel }}</span>
              </div>
            </div>
            
            <mat-divider></mat-divider>
            
            <div class="dropdown-items">
              <ng-container *ngFor="let item of filteredMenuItems">
                <div *ngIf="item.divider" class="dropdown-divider"></div>
                <button *ngIf="!item.divider && item.route" 
                        class="dropdown-item" 
                        (click)="navigate(item.route!)"
                        [class.active]="isActive(item.route!)">
                  <mat-icon>{{ item.icon }}</mat-icon>
                  <span>{{ item.label }}</span>
                </button>
                <button *ngIf="!item.divider && item.action" 
                        class="dropdown-item"
                        [class.logout]="item.action === 'logout'"
                        (click)="executeAction(item.action!)">
                  <mat-icon>{{ item.icon }}</mat-icon>
                  <span>{{ item.label }}</span>
                </button>
              </ng-container>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <div class="page-content">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
