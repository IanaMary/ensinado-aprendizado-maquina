server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API: repassa /api/ para o backend, removendo o prefixo /api
    # (a barra final no proxy_pass faz o strip). O backend serve as rotas na raiz.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 50m;
        # SSE do chat-tutor (/api/tutor/chat/stream) precisa de buffering off
        proxy_buffering off;
        proxy_set_header X-Accel-Buffering no;
    }

    # SPA Angular: qualquer rota cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
