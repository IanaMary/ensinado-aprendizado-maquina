<div class="modal-container">
  <!-- Seleção do modelo -->
  <div class="modelos-grid">
    <div *ngFor="let model of modelosDisponiveis" 
         class="modelo-card"
         [class.selected]="modeloValor === model.valor"
         (click)="modeloValor = model.valor; emitSelecaoModelo()">
      <div class="modelo-header">
        <mat-icon class="modelo-icon">memory</mat-icon>
        <span class="modelo-label">{{ model.label }}</span>
      </div>
      <p class="modelo-resumo">{{ model.resumo }}</p>
    </div>
  </div>

  <!-- Hiperparâmetros do modelo selecionado -->
  <div class="hiperparametros-section" *ngIf="hiperparametrosArray.length > 0">
    <div class="section-header">
      <mat-icon>tune</mat-icon>
      <span>Hiperparâmetros</span>
    </div>

    <div class="hiperparametros-grid">
      <div *ngFor="let param of hiperparametrosArray" class="param-field">
        <label class="param-label">
          {{ param.nome }}
          <code class="param-sklearn">{{ param.sklearn }}</code>
        </label>

        <!-- Campo de texto para números -->
        <input 
          *ngIf="param.tipo === 'int' || param.tipo === 'float'"
          matInput
          [type]="param.tipo === 'int' ? 'number' : 'number'"
          [step]="param.tipo === 'float' ? '0.1' : '1'"
          [value]="param.valor"
          (change)="atualizarHiperparametro(param, $any($event.target).value)"
          class="param-input"
          [placeholder]="'Padrão: ' + param.padrao">

        <!-- Campo de seleção para opções -->
        <mat-select
          *ngIf="param.opcoes?.length"
          [value]="param.valor"
          (selectionChange)="atualizarHiperparametro(param, $event.value)"
          class="param-select">
          <mat-option *ngFor="let opcao of param.opcoes" [value]="opcao">
            {{ opcao }}
          </mat-option>
        </mat-select>

        <!-- Campo de texto para strings sem opções -->
        <input 
          *ngIf="param.tipo === 'str' && !param.opcoes?.length"
          matInput
          type="text"
          [value]="param.valor"
          (change)="atualizarHiperparametro(param, $any($event.target).value)"
          class="param-input"
          [placeholder]="'Padrão: ' + param.padrao">

        <span class="param-hint" *ngIf="param.implicacoes">{{ param.implicacoes }}</span>
      </div>
    </div>
  </div>
</div>
