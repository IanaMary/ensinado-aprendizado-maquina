<div class="dashboard">
  <!-- Pipeline sidebar -->
  <aside class="dashboard-pipeline">
    <div class="pipeline-header">
      <span>Pipeline</span>
      <div class="pipeline-actions">
        <button type="button" class="pipeline-action-btn" (click)="salvarPipeline()" matTooltip="Salvar">
          <mat-icon>save</mat-icon>
        </button>
        <button type="button" class="pipeline-action-btn" (click)="limparSessao()" matTooltip="Limpar">
          <mat-icon>cleaning_services</mat-icon>
        </button>
        <button type="button" class="pipeline-action-btn" (click)="baixarPipeline()" [disabled]="!execucoesComponent?.modeloSelecionado" matTooltip="Baixar Pipeline">
          <mat-icon>download</mat-icon>
        </button>
      </div>
    </div>
    <div class="pipeline-content">
      <app-pipeline></app-pipeline>
    </div>
  </aside>

  <!-- Main content -->
  <main class="dashboard-execucoes">
    <app-execucoes></app-execucoes>
  </main>
</div>
