<div class="csv-config">
  <div class="cabecalho-topo">
    <h2>Configurar Leitura CSV</h2>
    <button mat-icon-button class="close-button" (click)="cancelar()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <mat-dialog-content class="dialog-content">
    <div class="config-row">
      <mat-form-field appearance="outline">
        <mat-label>Separador</mat-label>
        <mat-select [(ngModel)]="separador" (selectionChange)="onSeparadorChange()">
          <mat-option *ngFor="let s of separadores" [value]="s.valor">
            {{ s.label }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Encoding</mat-label>
        <mat-select [(ngModel)]="encoding" (selectionChange)="onEncodingChange()">
          <mat-option *ngFor="let e of encodings" [value]="e.valor">
            {{ e.label }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Linhas preview</mat-label>
        <input matInput type="number" [(ngModel)]="linhasPreview" min="1" max="100"
          (change)="fazerPreview()" />
      </mat-form-field>
    </div>

    <div *ngIf="carregando" class="loading">
      <mat-spinner diameter="30"></mat-spinner>
      <span>Lendo arquivo...</span>
    </div>

    <div *ngIf="erro" class="erro">{{ erro }}</div>

    <div *ngIf="!carregando && !erro && preview.length > 0" class="preview-section">
      <div class="preview-info">
        <span>{{ colunas.length }} colunas detectadas</span>
        <span>{{ preview.length }} linhas carregadas</span>
      </div>

      <div class="tabela-container">
        <table mat-table [dataSource]="paginaAtual" class="mat-table mat-elevation-z1">
          <ng-container *ngFor="let col of colunas" [matColumnDef]="col">
            <th mat-header-cell *matHeaderCellDef>
              <div class="col-header">
                <span>{{ col }}</span>
                <small class="col-type">{{ getTipoColuna(col) }}</small>
              </div>
            </th>
            <td mat-cell *matCellDef="let row">{{ row[col] }}</td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="colunas"></tr>
          <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
        </table>
      </div>

      <div class="paginacao">
        <button mat-icon-button [disabled]="pagina === 0" (click)="paginaAnterior()">
          <mat-icon>chevron_left</mat-icon>
        </button>
        <span class="paginacao-info">Página {{ pagina + 1 }} de {{ totalPaginas }}</span>
        <button mat-icon-button [disabled]="pagina >= totalPaginas - 1" (click)="proximaPagina()">
          <mat-icon>chevron_right</mat-icon>
        </button>
      </div>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="cancelar()">Cancelar</button>
    <button mat-raised-button color="primary" (click)="confirmar()" [disabled]="carregando || erro || preview.length === 0">
      Confirmar Importação
    </button>
  </mat-dialog-actions>
</div>
