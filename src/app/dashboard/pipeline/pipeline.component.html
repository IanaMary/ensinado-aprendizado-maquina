<div class="pipeline-container">
  <!-- Dados -->
  <div class="pipeline-section">
    <div class="section-label">
      <div class="step-number">1</div>
      <span>Dados</span>
    </div>
    <app-coleta-de-dados></app-coleta-de-dados>
  </div>

  <!-- Pré-processamento -->
  <div class="pipeline-section">
    <div class="section-label">
      <div class="step-number">2</div>
      <span>Pré-processamento</span>
    </div>
    <app-pre-processamento></app-pre-processamento>
  </div>

  <!-- Modelos -->
  <div class="pipeline-section">
    <div class="section-label">
      <div class="step-number">3</div>
      <span>Modelos</span>
    </div>
    <app-treino-validacao-teste></app-treino-validacao-teste>
  </div>

  <!-- Avaliação -->
  <div class="pipeline-section">
    <div class="section-label">
      <div class="step-number">4</div>
      <span>Avaliação</span>
    </div>
    <app-metricas></app-metricas>
  </div>

  <!-- Ações -->
  <div class="pipeline-actions">
    <button (click)="navegar(true)" class="btn-secondary" *ngIf="role !== 'aluno'">
      <mat-icon>arrow_back</mat-icon>
      Voltar
    </button>
    <button (click)="navegar(false)" class="btn-danger">
      <mat-icon>logout</mat-icon>
      Sair
    </button>
  </div>
</div>
